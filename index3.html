<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lokakarya Pengembangan BIPA Daring 2026</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body {
height:100%;
margin:0;
padding:0;
}

main{
min-height:100vh;
}

.page-section{display:none;}
.page-section.active{display:block;}

::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:#f1f1f1;}
::-webkit-scrollbar-thumb{background:#3b82f6;border-radius:10px;}

.table-container{overflow-x:auto;}

.target-card:hover{
transform:translateY(-5px);
transition:all 0.3s ease;
}

.module-grid-card{
transition:all 0.3s ease;
height:100%;
}

.module-grid-card:hover{
border-color:#3b82f6;
box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);
}

.upload-btn{
display:flex;
align-items:center;
justify-content:center;
gap:6px;
padding:6px 10px;
background:#f3f4f6;
color:#374151;
border-radius:4px;
font-size:10px;
font-weight:600;
border:1px solid #d1d5db;
}

.upload-btn:hover{
background:#e5e7eb;
}

.upload-btn-primary{
display:flex;
align-items:center;
justify-content:center;
gap:6px;
padding:10px;
background:#2563eb;
color:white;
border-radius:6px;
font-size:12px;
font-weight:bold;
width:100%;
}

.upload-btn-primary:hover{
background:#1d4ed8;
}

#pdf-modal{display:none;}
#pdf-modal.active{display:flex;}

/* upload modal */
#upload-modal{display:none;}
#upload-modal.active{display:flex;}
</style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans leading-normal">

<!-- Navigasi -->
<nav class="bg-blue-800 text-white shadow-lg sticky top-0 z-50">
<div class="max-w-6xl mx-auto px-4">
<div class="flex justify-between items-center h-16">

<div class="flex items-center">
<span class="text-xl font-bold tracking-wider uppercase">
Lokakarya BIPA Daring 2026
</span>
</div>

<div class="hidden md:flex space-x-2">

<button onclick="showPage('beranda')" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 transition">
Beranda
</button>

<button onclick="showPage('tujuan')" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 transition">
Tujuan Kegiatan
</button>

<button onclick="openPdfModal('https://drive.google.com/file/d/1KRvEZbUEcJLAlBENkhyB_cqsqaNRKAlg/preview')" class="px-3 py-2 rounded-md text-sm font-bold text-orange-300 hover:bg-blue-700 transition">
Pembagian Tugas
</button>

<button onclick="showPage('modul')" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 transition text-green-300 font-bold">
Unggahan Notula dan Materi
</button>

<button onclick="showPage('jadwal')" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 transition text-yellow-300 font-bold">
Jadwal
</button>

<a href="https://drive.google.com/drive/folders/10RjawprkABzzx0yBecm_gRIoxh-B3S2s" target="_blank" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 transition flex items-center gap-1">
Dokumentasi
<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
</svg>
</a>

</div>

<div class="md:hidden flex items-center">
<button onclick="toggleMobileMenu()" class="outline-none">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
</svg>
</button>
</div>

</div>
</div>

<div id="mobile-menu" class="hidden md:hidden bg-blue-700 pb-4 px-4 space-y-1 shadow-inner">

<button onclick="showPage('beranda')" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium">
Beranda
</button>

<button onclick="showPage('tujuan')" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium">
Tujuan Kegiatan
</button>

<button onclick="openPdfModal('https://drive.google.com/file/d/1tJN594joTyk3u3SxP-Ej7q0UXvi-xlx1/preview')" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-orange-300">
Pembagian Tugas 📄
</button>

<button onclick="showPage('modul')" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-green-300">
Unggahan Notula dan Materi
</button>

<button onclick="showPage('jadwal')" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-yellow-300">
Jadwal
</button>

<a href="https://drive.google.com/drive/folders/10RjawprkABzzx0yBecm_gRIoxh-B3S2s" target="_blank" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium">
Dokumentasi ↗
</a>

</div>
</nav>

<!-- Upload Modal -->
<div id="upload-modal" class="fixed inset-0 z-[120] bg-black bg-opacity-60 items-center justify-center p-4">

<div class="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden">

<div class="bg-blue-800 text-white px-4 py-3 flex justify-between items-center">
<span class="text-sm font-bold">Form Unggah Dokumen</span>

<button onclick="closeUploadModal()">✕</button>
</div>

<div class="p-5 space-y-4">

<div>
<label class="text-xs font-bold">Nama Pengunggah</label>
<input id="uploader-name" type="text" class="w-full border rounded px-3 py-2 text-xs">
</div>

<div>
<label class="text-xs font-bold">Link Dokumen</label>
<input id="doc-link" type="text" class="w-full border rounded px-3 py-2 text-xs">
</div>

<button onclick="goToDrive()" class="w-full bg-blue-800 text-white py-2 rounded text-xs font-bold">
Lanjutkan ke Google Drive
</button>

</div>
</div>
</div>

<script>

function showPage(pageId){
const sections=document.querySelectorAll('.page-section');
sections.forEach(section=>section.classList.remove('active'));
document.getElementById(pageId).classList.add('active');
window.scrollTo({top:0,behavior:'smooth'});
document.getElementById('mobile-menu').classList.add('hidden');
}

function toggleMobileMenu(){
document.getElementById('mobile-menu').classList.toggle('hidden');
}

function openPdfModal(url){
const modal=document.getElementById('pdf-modal');
const iframe=document.getElementById('pdf-iframe');
iframe.src=url;
modal.classList.add('active');
document.body.style.overflow='hidden';
document.getElementById('mobile-menu').classList.add('hidden');
}

function closePdfModal(){
const modal=document.getElementById('pdf-modal');
const iframe=document.getElementById('pdf-iframe');
modal.classList.remove('active');
iframe.src='';
document.body.style.overflow='auto';
}

document.getElementById('pdf-modal')?.addEventListener('click',function(e){
if(e.target===this)closePdfModal();
});

/* upload modal */

let driveLink="";

function openUploadModal(url){
driveLink=url;
document.getElementById("upload-modal").classList.add("active");
}

function closeUploadModal(){
document.getElementById("upload-modal").classList.remove("active");
}

function goToDrive(){

const name=document.getElementById("uploader-name").value;

if(name===""){
alert("Silakan isi nama pengunggah terlebih dahulu.");
return;
}

window.open(driveLink,"_blank");

closeUploadModal();

}

</script>

</body>
</html>
